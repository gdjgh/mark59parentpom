name: Publish Parent POM to GitHub Pages

on:
  push:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  publish:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    permissions:
      pages: write
      id-token: write
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Extract POM version
        id: pom-version
        run: |
          VERSION=$(mvn -q -Dexec.executable=echo -Dexec.args='${project.version}' --non-recursive exec:exec -f mark59-parent/pom.xml)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "POM Version: $VERSION"

      - name: Deploy to local repo
        run: |
          mvn deploy -DaltDeploymentRepository=local::default::file://$(pwd)/target/mvn-repo
        working-directory: mark59-parent

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: mark59-parent/target/mvn-repo

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.pom-version.outputs.version }}
          name: Release ${{ steps.pom-version.outputs.version }}
          body: |
            Automated release for version ${{ steps.pom-version.outputs.version }}
            Published to GitHub Pages
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
